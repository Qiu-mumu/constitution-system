name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install requests
      - name: 离线自测
        run: python test_constitution.py --offline
      - name: 语法检查
        run: python -c "import ast; ast.parse(open('debate.py').read())"
